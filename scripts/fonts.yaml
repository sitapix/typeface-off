# One place to hand-add fonts. Two sections:
#
#   google: …   extra Google/Bunny families beyond the auto-selected popular set
#               (just names). Applied by:  npm run fonts:generate
#   local:  …   self-hosted fonts (files in static/fonts/).
#               Applied by:  npm run fonts:local
#
# (The bulk of the catalog is auto-generated by popularity — see
#  scripts/generate-fonts.cjs. This file is only for your manual additions.)

# --- Extra Google fonts: one family name per list item, spelled as on Google
#     Fonts. Duplicates / unknowns / not-on-Bunny are reported and skipped. ---
google:
  - Onest
  - Pixelify Sans

# --- Self-hosted fonts. Required: family, category, and files: (or faces:).
#     Optional: variable: true · url: https://… · license: OFL-1.1 · designer: …
#     IMPORTANT: you redistribute these files, so also drop the font's license
#     text in  static/fonts/licenses/  (most OSS fonts are OFL-1.1). See FONTS.md.
local:
  - family: Space Grotesk
    category: sans
    files: [SpaceGrotesk.ttf]
    designer: Florian Karsten
    license: OFL-1.1
    url: https://github.com/floriankarsten/space-grotesk

