# One place to hand-add fonts. Two sections:
#
#   google: …   extra Google/Bunny families beyond the auto-selected popular set
#               (just names). Applied by:  npm run fonts:generate
#   local:  …   self-hosted fonts (files in static/fonts/).
#               Applied by:  npm run fonts:local
#
# (The bulk of the catalog is auto-generated by popularity — see
#  scripts/generate-fonts.cjs. This file is only for your manual additions.)

# --- Extra Google fonts: one family name per list item, spelled as on Google
#     Fonts. Duplicates / unknowns / not-on-Bunny are reported and skipped. ---
google:
  - Onest
  - Pixelify Sans
  - Cal Sans
  # --- Added from forum-popularity research (2026-06-02). Each is looked up in
  #     the Google metadata for its category, so it lands in whatever category
  #     Google assigns (e.g. Anton → sans). Not-on-Bunny / misspelled names are
  #     reported and skipped by the generator. ---
  # sans (community workhorses + most-requested free alternatives)
  - Hanken Grotesk
  - Atkinson Hyperlegible
  - League Spartan
  # serif (body-reading + libre classics the community keeps naming)
  - Alegreya
  - Literata
  - Crimson Pro
  - Cardo
  - Sorts Mill Goudy
  - Tinos
  - Gentium Plus
  - Young Serif
  - Fanwood Text
  # mono
  - Intel One Mono
  - Martian Mono
  - Spline Sans Mono
  - B612 Mono
  - Atkinson Hyperlegible Mono
  # display (condensed / blackletter / brush / pixel / groovy / novelty)
  - Anton
  - UnifrakturMaguntia
  - Shrikhand
  - Fredoka
  - Sixtyfour
  - Bagel Fat One
  - Rampart One
  - Corben
  - Climate Crisis

# --- Self-hosted fonts. Required: family, category, and files: (or faces:).
#     Optional: variable: true · url: https://… · license: OFL-1.1 · designer: …
#     IMPORTANT: you redistribute these files, so also drop the font's license
#     text in  static/fonts/licenses/  (most OSS fonts are OFL-1.1).
#     Full guide: docs/add-a-font-by-hand.md
local:
  - family: Space Grotesk
    category: sans
    files: [SpaceGrotesk.ttf]
    designer: Florian Karsten
    license: OFL-1.1
    url: https://github.com/floriankarsten/space-grotesk

  - family: Karrik
    category: sans
    files: [Karrik-Regular.woff2, Karrik-Italic.woff2]
    designer: Jean-Baptiste Morizot & Lucas Le Bihan
    license: OFL-1.1
    url: https://velvetyne.fr/fonts/karrik/

  - family: Techna Sans
    category: sans
    files: [TechnaSans-Regular.woff2]
    designer: Carl Enlund
    license: OFL-1.1
    url: https://github.com/carlenlund/techna-sans

  - family: Hanken Round
    category: sans
    files: [HankenRound-Regular.woff2]
    designer: Alfredo Marco Pradil
    license: OFL-1.1
    url: https://www.fontsquirrel.com/fonts/hanken-round

  - family: LINE Seed Sans
    category: sans
    files:
      [
        LINESeedSans-Thin.woff2,
        LINESeedSans-Regular.woff2,
        LINESeedSans-Bold.woff2,
        LINESeedSans-ExtraBold.woff2,
        LINESeedSans-Heavy.woff2
      ]
    designer: LINE VX Design & Dalton Maag & Sandoll
    license: OFL-1.1
    url: https://seed.line.me

  - family: Nimbus Sans L
    category: sans
    files:
      [
        NimbusSansL-Regular.woff2,
        NimbusSansL-Bold.woff2,
        NimbusSansL-Italic.woff2,
        NimbusSansL-BoldItalic.woff2
      ]
    designer: URW++ (Cyrillic by Valek Filippov)
    license: GPL-2.0 with font exception
    url: https://www.fontsquirrel.com/fonts/nimbus-sans

  - family: Departure Mono
    category: mono
    files: [DepartureMono-Regular.woff2]
    designer: Helena Zhang
    license: OFL-1.1
    url: https://departuremono.com

  # Pixel/bitmap monospace inspired by Minecraft. Single weight; the code
  # specimen never bolds and faux-italics comments.
  - family: Monocraft
    category: mono
    files: [Monocraft.woff2]
    designer: Idrees Hassan
    license: OFL-1.1
    url: https://github.com/IdreesInc/Monocraft

  # Sharp coding font vectorized from Monocraft; same designer.
  - family: Miracode
    category: mono
    files: [Miracode.woff2]
    designer: Idrees Hassan
    license: OFL-1.1
    url: https://github.com/IdreesInc/Miracode

  - family: Hermit
    category: mono
    files: [Hermit.woff2]
    designer: Pablo Caro
    license: OFL-1.1
    url: https://pcaro.es/p/hermit/

  - family: Agave
    category: mono
    files: [Agave-Regular.woff2]
    designer: type agaric
    license: MIT
    url: https://github.com/blobject/agave

  # Handwriting-style monospace (fixed pitch); Regular weight only.
  - family: Annotation Mono
    category: mono
    files: [AnnotationMono-Regular.woff2]
    designer: Qwerasd
    license: OFL-1.1
    url: https://github.com/qwerasd205/AnnotationMono

  # Self-hosted (v1.143) overrides the Fontsource catalog entry of the same
  # name. Regular only — the code specimen never bolds, and comments faux-italic.
  - family: Commit Mono
    category: mono
    files: [CommitMono-400-Regular.woff2]
    designer: Eigil Nikolajsen
    license: OFL-1.1
    url: https://commitmono.com

  # Self-hosted (v34.6.1, subset from the desktop .ttc) overrides the
  # Fontsource catalog entry of the same name.
  - family: Iosevka
    category: mono
    files: [Iosevka-Regular.woff2]
    designer: Belleve Invis
    license: OFL-1.1
    url: https://typeof.net/Iosevka/

  # Italic included on purpose — Victor Mono's signature cursive italic is the
  # whole point, and it renders in the specimen's comment lines.
  - family: Victor Mono
    category: mono
    files: [VictorMono-Regular.woff2, VictorMono-Italic.woff2]
    designer: Rune Bjorneras
    license: OFL-1.1
    url: https://rubjo.github.io/victor-mono/

  - family: Serious Shanns
    category: mono
    files: [SeriousShanns-Regular.woff2]
    designer: Shannon Miwa & Kyle Beechly
    license: MIT
    url: https://kabeech.github.io/serious-shanns/

  - family: Phlatt Grotesk
    category: sans
    files: [PhlattGrotesk-Regular.woff2]
    designer: RandomMaerks
    license: OFL-1.1
    url: https://randommaerks.gumroad.com

  - family: Fixel
    category: sans
    files: [FixelText-Regular.woff2]
    designer: Alfabravo & MacPaw
    license: OFL-1.1
    url: https://github.com/macpaw/Fixel

  - family: Overused Grotesk
    category: sans
    files: [OverusedGrotesk-Regular.woff2]
    designer: RandomMaerks
    license: OFL-1.1
    url: https://github.com/RandomMaerks/Overused-Grotesk

  # Free DIN 1451 revival; ships regular, bold, and italic faces.
  - family: D-DIN
    category: sans
    files: [D-DIN.woff2, D-DIN-Bold.woff2, D-DIN-Italic.woff2]
    designer: Datto Inc.
    license: OFL-1.1
    url: https://www.datto.com/fonts/d-din

  # Geometric sans; dual-licensed OFL/MIT (OFL recorded here).
  - family: Gidole
    category: sans
    files: [Gidole-Regular.woff2]
    designer: Andreas Larsen
    license: OFL-1.1
    url: https://github.com/larsenwork/Gidole

  # Libertine serif; dual-licensed GPL+FE/OFL (OFL recorded here).
  - family: Linux Libertine
    category: serif
    files: [LinuxLibertine-Regular.woff2]
    designer: Philipp H. Poll
    license: OFL-1.1
    url: https://sourceforge.net/projects/linuxlibertine/

  # - family: My Serif
  #   category: serif
  #   files: [MySerif-Regular.woff2, MySerif-Bold.woff2, MySerif-Italic.woff2]
