# Self-hosted fonts — the easy way. Each entry becomes a font in the catalog.
# Put the file(s) in  static/fonts/  then run:  npm run fonts:local
#
# Required:
#   family    – the display / CSS family name
#   category  – sans | serif | display | script | mono
#   and EITHER:
#     files:  [a.woff2, b.woff2]   – weight & style inferred from each filename
#   OR (for full control):
#     faces:  [{ file: a.woff2, weight: "700", style: italic }, ...]
#
# Optional:
#   variable: true        – a variable file (covers all weights from one file)
#   url: https://…         – the Visit/Download link (defaults to the font file)
#
# Missing files or bad categories are reported and skipped.

- family: Space Grotesk
  category: sans
  files: [SpaceGrotesk.ttf]
