name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR (don't pile up CI on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Order = shift left: cheapest checks first, so a formatting nit fails in
      # seconds instead of after a full build.
      - name: Lint (prettier)
        run: npm run lint

      - name: Type check (svelte-check)
        run: npm run check

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (adapter-static)
        run: npm run build

      # Audit only what actually ships (the single runtime dependency tree).
      # Dev-only advisories never reach users, so they shouldn't block a PR.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high
