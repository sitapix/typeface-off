name: Deploy to GitHub Pages

on:
  # Auto-deploy whatever lands on main.
  push:
    branches: [main]
  # and allow a manual re-deploy from the Actions tab.
  workflow_dispatch:

# Least privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Project site (typogram.github.io/coding-font-sveltekit) → assets and
      # self-hosted @font-face URLs must be prefixed. svelte.config.js reads
      # paths.base from BASE_PATH; '' (root) is correct for a user/custom domain.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
