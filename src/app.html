<!doctype html>
<html lang="en" data-theme="cerberus">
  <head>
    <meta charset="utf-8" />
    <!-- Apply the persisted theme + colour scheme before first paint, so a
         non-default theme or dark mode doesn't flash the hard-coded default on
         every load. The reactive source of truth stays in ThemePicker /
         ThemeSwitch; this only pre-seeds the DOM. Keys match persisted(). -->
    <script>
      try {
        var t = JSON.parse(localStorage.getItem('theme'));
        if (t) document.documentElement.dataset.theme = t;
        if (JSON.parse(localStorage.getItem('color-scheme')) === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch (e) {
        /* no localStorage / malformed value — keep the markup default */
      }
    </script>
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" sizes="any" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0c0a09" />
    <title>TypefaceOff</title>
    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents" class="h-full overflow-hidden">
      %sveltekit.body%
    </div>
  </body>
</html>
